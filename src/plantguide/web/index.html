<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantGuide – Identify &amp; Care</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #f0f7f0; color: #2d3e2d; line-height: 1.6; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 30px 0; }
  header h1 { font-size: 2rem; color: #2d6e2d; }
  header p { color: #5a7a5a; }
  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .tag { background: #e8f0e8; color: #2d6e2d; padding: 6px 14px; border-radius: 20px;
         cursor: pointer; font-size: 0.9rem; transition: all 0.2s; border: 2px solid transparent; }
  .tag:hover { background: #d0e8d0; }
  .tag.selected { background: #2d6e2d; color: #fff; border-color: #1a5a1a; }
  .btn { background: #2d6e2d; color: #fff; border: none; padding: 12px 28px;
         border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #1a5a1a; }
  .btn:disabled { background: #a0c0a0; cursor: not-allowed; }
  .results { margin-top: 20px; }
  .match-item { padding: 16px; border-bottom: 1px solid #e0e8e0; display: flex;
                justify-content: space-between; align-items: center; }
  .match-item:last-child { border-bottom: none; }
  .match-name { font-weight: 600; font-size: 1.05rem; }
  .match-score { background: #e8f0e8; padding: 4px 12px; border-radius: 12px;
                 font-size: 0.85rem; color: #2d6e2d; }
  .care-card { margin-top: 20px; padding: 20px; background: #f8fbf8; border-radius: 10px;
               border: 1px solid #d0e0d0; }
  .care-card h3 { color: #2d6e2d; margin-bottom: 6px; }
  .care-card .species-name { font-style: italic; color: #5a7a5a; margin-bottom: 12px; }
  .care-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
  .care-item { padding: 8px; }
  .care-item strong { display: block; font-size: 0.8rem; color: #5a7a5a; text-transform: uppercase; }
  .care-item span { font-size: 0.95rem; }
  .issues { margin: 12px 0; }
  .issues li { margin: 4px 0; margin-left: 20px; font-size: 0.9rem; }
  .custom-tags { display: flex; gap: 8px; margin: 12px 0; }
  .custom-tags input { flex: 1; padding: 10px 14px; border: 2px solid #d0e0d0; border-radius: 8px;
                       font-size: 0.95rem; outline: none; }
  .custom-tags input:focus { border-color: #2d6e2d; }
  .spinner { display: none; margin: 20px auto; width: 40px; height: 40px; border: 4px solid #e0e8e0;
             border-top-color: #2d6e2d; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: #8a9a8a; }
  .match-detail { font-size: 0.8rem; color: #5a7a5a; }
  .error-msg { color: #c0392b; background: #fce8e8; padding: 12px; border-radius: 8px; margin: 10px 0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🪴 PlantGuide</h1>
    <p>Identify your plant and get care advice</p>
  </header>

  <div class="card">
    <h2>1. Describe your plant</h2>
    <p style="color:#5a7a5a;font-size:0.9rem">Select tags that match what you see, or type your own.</p>

    <div class="tag-grid" id="popular-tags"></div>

    <div class="custom-tags">
      <input type="text" id="tag-input" placeholder="Type a tag and press Enter..." />
      <button class="btn" id="add-tag-btn" style="padding:10px 16px;">Add</button>
    </div>

    <div class="tag-grid" id="selected-tags"></div>

    <button class="btn" id="identify-btn" disabled>Identify →</button>
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="card results" id="results-card" style="display:none">
    <h2>2. Results</h2>
    <div id="matches"></div>
    <div id="care-card"></div>
  </div>
</div>

<script>
const API_BASE = ''; // empty = same-origin, change to FastAPI URL if deployed

const POPULAR_TAGS = [
  'indoor', 'succulent', 'tropical', 'flowering', 'trailing',
  'easy care', 'climbing', 'large leaves', 'variegated', 'cactus',
  'low light', 'air purifying', 'pet friendly', 'drought tolerant',
  'purple', 'pink', 'red', 'green and white', 'spiky leaves',
];

const selectedTags = new Set();

// Initialize popular tags
const popularGrid = document.getElementById('popular-tags');
POPULAR_TAGS.forEach(tag => {
  const el = document.createElement('span');
  el.className = 'tag';
  el.textContent = tag;
  el.onclick = () => toggleTag(tag);
  popularGrid.appendChild(el);
});

function toggleTag(tag) {
  if (selectedTags.has(tag)) {
    selectedTags.delete(tag);
  } else {
    selectedTags.add(tag);
  }
  renderSelected();
  updateBtn();
}

function addCustomTag() {
  const input = document.getElementById('tag-input');
  const tag = input.value.trim().toLowerCase();
  if (!tag || selectedTags.has(tag)) return;
  selectedTags.add(tag);
  input.value = '';
  renderSelected();
  updateBtn();
}

document.getElementById('tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCustomTag();
});
document.getElementById('add-tag-btn').onclick = addCustomTag;

function renderSelected() {
  const container = document.getElementById('selected-tags');
  container.innerHTML = '';
  selectedTags.forEach(tag => {
    const el = document.createElement('span');
    el.className = 'tag selected';
    el.textContent = tag + ' ×';
    el.onclick = () => { selectedTags.delete(tag); renderSelected(); updateBtn(); };
    container.appendChild(el);
  });
  // Update popular tags
  document.querySelectorAll('#popular-tags .tag').forEach(el => {
    el.classList.toggle('selected', selectedTags.has(el.textContent));
  });
}

function updateBtn() {
  document.getElementById('identify-btn').disabled = selectedTags.size === 0;
}

document.getElementById('identify-btn').onclick = identify;

async function identify() {
  const tags = Array.from(selectedTags);
  const spinner = document.getElementById('spinner');
  const resultsCard = document.getElementById('results-card');
  const matchesDiv = document.getElementById('matches');
  const careDiv = document.getElementById('care-card');
  const errorDiv = document.getElementById('error-msg');

  spinner.style.display = 'block';
  resultsCard.style.display = 'none';

  try {
    const url = API_BASE + '/identify?with_care=true';
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tags, top_k: 5 })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const data = await resp.json();

    // Show matches
    if (!data.matches || data.matches.length === 0) {
      matchesDiv.innerHTML = '<div class="empty">No matches found. Try different tags.</div>';
    } else {
      let html = '';
      data.matches.forEach((m, i) => {
        const badge = i === 0 ? ' 🏆' : '';
        html += '<div class="match-item">' +
          '<div><div class="match-name">' + (m.common_name || m.species_id) + badge + '</div>' +
          '<div class="match-detail">' + m.species_id + ' — ' + (m.explanation || '') + '</div></div>' +
          '<div class="match-score">' + (m.score * 100).toFixed(0) + '%</div>' +
          '</div>';
      });
      matchesDiv.innerHTML = html;
    }

    // Show care card
    if (data.top_care) {
      const c = data.top_care;
      let html = '<div class="care-card"><h3>' + (c.common_name || c.species_id) + ' Care</h3>' +
        '<div class="species-name">' + (c.scientific_name || '') + '</div>' +
        '<p>' + (c.summary || '') + '</p>' +
        '<div class="care-grid">' +
        '<div class="care-item"><strong>Light</strong><span>' + (c.light || '—') + '</span></div>' +
        '<div class="care-item"><strong>Water</strong><span>' + (c.water || '—') + '</span></div>' +
        '<div class="care-item"><strong>Soil</strong><span>' + (c.soil || '—') + '</span></div>' +
        '<div class="care-item"><strong>Humidity</strong><span>' + (c.humidity || '—') + '</span></div>' +
        '<div class="care-item"><strong>Temperature</strong><span>' + (c.temperature_c || '—') + '°C</span></div>' +
        '<div class="care-item"><strong>Fertilizer</strong><span>' + (c.fertilizer || '—') + '</span></div>' +
        '</div>';
      if (c.common_issues && c.common_issues.length) {
        html += '<div class="issues"><strong>Common Issues</strong><ul>';
        c.common_issues.forEach(i => { html += '<li>' + i + '</li>'; });
        html += '</ul></div>';
      }
      if (c.tips && c.tips.length) {
        html += '<div class="issues"><strong>Tips</strong><ul>';
        c.tips.forEach(t => { html += '<li>' + t + '</li>'; });
        html += '</ul></div>';
      }
      html += '</div>';
      careDiv.innerHTML = html;
    } else {
      careDiv.innerHTML = '';
    }

    resultsCard.style.display = 'block';
  } catch (err) {
    matchesDiv.innerHTML = '<div class="error-msg">Error: ' + err.message + '</div>';
    resultsCard.style.display = 'block';
  } finally {
    spinner.style.display = 'none';
  }
}
</script>
</body>
</html>
